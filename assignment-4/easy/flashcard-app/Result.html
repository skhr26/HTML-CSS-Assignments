<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result</title>
</head>
<body style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:sans-serif;" onload="setData()">

    <div style="text-align:center;padding:30px;border-radius:12px;background:#f5f5f5;">
        <h1>Quiz Completed 🎉</h1>

        <h2 id="score"></h2>

        <button onclick="restart()">
            Play Again
        </button>
    </div>

    <script>

      function setData() {
        const score = localStorage.getItem("score");
        const total = localStorage.getItem("total");

        document.getElementById("score").innerText =
            `Your Score: ${score} / ${total}`;

      }

        function restart() {
            localStorage.removeItem("score");
            localStorage.removeItem("total");

            window.location.href = "index.html";
        }
    </script>

</body>
</html>
